# C/C++: 1. AMD Zen 5 (znver5) 2. Omit frame pointer 3. O3 optimization
CFLAGS="-march=znver5 -O3 -pipe -fno-plt -fexceptions \
        -Wp,-D_FORTIFY_SOURCE=3 -Wformat -Werror=format-security \
        -fstack-clash-protection -fcf-protection \
        -fomit-frame-pointer"
CXXFLAGS="$CFLAGS -Wp,-D_GLIBCXX_ASSERTIONS"

# Rust: Optimize for Zen 5 microarchitecture and force Thin LTO
export RUSTFLAGS="-C target-cpu=znver5 -C opt-level=3 -C lto=thin"

# Go: Optimize for AMD64 v3 microarchitecture level (AVX2)
export GOAMD64="v3"

# Dynamic parallel compilation using all available CPU cores
MAKEFLAGS="-j$(nproc)"
