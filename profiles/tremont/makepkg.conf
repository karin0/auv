# C/C++: 1. Intel Tremont 2. Omit frame pointer 3. O2 optimization (ideal for Atom core pipelines)
CFLAGS="-march=tremont -O2 -pipe -fno-plt -fexceptions \
        -Wp,-D_FORTIFY_SOURCE=3 -Wformat -Werror=format-security \
        -fstack-clash-protection -fcf-protection \
        -fomit-frame-pointer"
CXXFLAGS="$CFLAGS -Wp,-D_GLIBCXX_ASSERTIONS"

# Rust: Optimize for Tremont microarchitecture and force Thin LTO
export RUSTFLAGS="-C target-cpu=tremont -C opt-level=2 -C lto=thin"

# Go: Optimize for AMD64 v2 microarchitecture level (SSE4.2, NO AVX2)
export GOAMD64="v2"

# Dynamic parallel compilation using all available CPU cores
MAKEFLAGS="-j$(nproc)"
