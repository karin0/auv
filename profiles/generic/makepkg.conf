# generic makepkg configuration (Compile Barrier Fail-Safe)
# If a package in this profile attempts to compile source code, 
# the compiler will encounter an invalid flag and crash immediately.
# This guarantees that only 100% pre-compiled/script packages can be built.

# C/C++: Pass an invalid CPU architecture to force GCC/G++ to abort immediately
CFLAGS="-march=invalid-generic-cpu-compilation-forbidden-error"
CXXFLAGS="$CFLAGS"

# Rust: Pass an invalid target-cpu to force rustc to abort immediately
export RUSTFLAGS="-C target-cpu=invalid-generic-rust-compilation-forbidden-error"

# Go: Pass an invalid GOAMD64 level to force go compiler to abort immediately
export GOAMD64="invalid_generic_go_compilation_forbidden_error"

# Parallel compilation flag (irrelevant but kept for format consistency)
MAKEFLAGS="-j$(nproc)"
