name: AUR Voyager

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 6,14,22 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile: [generic, alderlake, tremont, znver5]

    steps:
      - uses: actions/checkout@v6

      - name: Cache Pacman Packages
        uses: actions/cache@v5
        with:
          path: pacman-cache
          key: pacman-cache-${{ matrix.profile }}-${{ github.run_id }}
          restore-keys: |
            pacman-cache-${{ matrix.profile }}-

      - name: Cache AUR Clones
        uses: actions/cache@v5
        with:
          path: clones
          key: aur-clones-${{ matrix.profile }}-${{ github.run_id }}
          restore-keys: |
            aur-clones-${{ matrix.profile }}-

      - name: Download Existing Database
        run: ./scripts/download-release-assets.sh ${{ matrix.profile }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Build Packages in Arch Container
        run: |
          mkdir -p pacman-cache clones
          docker run \
            -v "$PWD":/workspace \
            -v "$PWD/pacman-cache":/var/cache/pacman/pkg \
            -w /workspace \
            -e NO_CHROOT=1 \
            archlinux:latest \
            ./scripts/build-in-container.sh ${{ matrix.profile }}
          sudo chown -R $USER:$USER pacman-cache clones


      - name: Synchronize and Clean Repository Assets
        run: ./scripts/clean-release-assets.sh ${{ matrix.profile }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Ensure Release Tag Exists
        run: |
          gh release create ${{ matrix.profile }} \
            --title ${{ matrix.profile }} \
            --repo ${{ github.repository }} || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload and Clobber Assets to Release Channel
        run: |
          gh release upload ${{ matrix.profile }} \
            repos/${{ matrix.profile }}/* \
            --clobber \
            --repo ${{ github.repository }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
