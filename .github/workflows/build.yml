name: AUR Voyager

on:
  schedule:
    - cron: '0 6,14,22 * * *'
  push:
    branches:
      - main
    paths-ignore:
      - 'docker/**'
      - '.github/workflows/image.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile: [generic, alderlake, tremont, znver5]

    steps:
      # https://github.com/actions/virtual-environments/issues/1918
      - name: Cleanup pre-installed tools
        run: |
          shopt -s nullglob
          sudo rm -rf /usr/share/{dotnet,swift,az*,gradle*,*conda} \
            /opt/{ghc,az} \
            /usr/local/share/boost /usr/local/graalvm /usr/local/julia* "$AGENT_TOOLSDIRECTORY"

      - uses: actions/checkout@v6

      - name: Restore Pacman Packages Cache
        uses: actions/cache/restore@v5
        with:
          path: pacman-cache
          key: pacman-cache-${{ matrix.profile }}-${{ github.run_id }}
          restore-keys: |
            pacman-cache-${{ matrix.profile }}-

      - name: Restore AUR Clones Cache
        uses: actions/cache/restore@v5
        with:
          path: clones
          key: aur-clones-${{ matrix.profile }}-${{ github.run_id }}
          restore-keys: |
            aur-clones-${{ matrix.profile }}-

      - name: Download Existing Database
        run: ./scripts/fetch-assets.sh ${{ matrix.profile }} || echo 'Failed to fetch existing assets.'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Packages in Arch Container
        id: build
        run: |
          mkdir -p pacman-cache clones
          docker run \
            -v "$PWD":/workspace \
            -v "$PWD/pacman-cache":/var/cache/pacman/pkg \
            -w /workspace \
            -e GITHUB_REPOSITORY=${{ github.repository }} \
            -e CI=1 \
            ghcr.io/${{ github.repository }}/auv-builder:latest \
            ./scripts/build-in-container.py ${{ matrix.profile }}
          sudo chown -R $USER:$USER pacman-cache clones
          if [[ -s state/${{ matrix.profile }}/notify.txt ]]; then
            echo "updated=1" >> "$GITHUB_OUTPUT"
          fi

      - name: Synchronize Release Assets
        if: steps.build.outputs.updated == '1'
        run: ./scripts/sync-assets.sh ${{ matrix.profile }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Save Pacman Packages Cache
        if: steps.build.outputs.updated == '1'
        uses: actions/cache/save@v5
        with:
          path: pacman-cache
          key: pacman-cache-${{ matrix.profile }}-${{ github.run_id }}

      - name: Save AUR Clones Cache
        if: steps.build.outputs.updated == '1'
        uses: actions/cache/save@v5
        with:
          path: clones
          key: aur-clones-${{ matrix.profile }}-${{ github.run_id }}
