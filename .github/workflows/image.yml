name: Builder Image

on:
  schedule:
    - cron: '0 4 * * *'
  push:
    branches:
      - main
    paths:
      - 'docker/**'
      - '.github/workflows/image.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch aurutils
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh release download generic --pattern 'aurutils-*.pkg.tar.zst' --dir docker --repo "$GITHUB_REPOSITORY"; then
            echo "Bootstrapping aurutils ..."
            docker run --rm \
              -v "$PWD/docker":/workspace \
              archlinux:latest \
              bash -c '
                set -e
                pacman -Syu --noconfirm base-devel
                useradd -m -u 1001 builder
                echo "builder ALL=(ALL:ALL) NOPASSWD: ALL" >> /etc/sudoers
                sudo -u builder bash -c "
                  cd ~
                  curl -sSfLO https://aur.archlinux.org/cgit/aur.git/snapshot/aurutils.tar.gz
                  tar -xf aurutils.tar.gz
                  cd aurutils
                  makepkg -s --noconfirm --skippgpcheck
                  cp aurutils-*.pkg.tar.zst /workspace/
                "
              '
          fi

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}/auv-builder
          tags: |
            type=raw,value=latest
            type=sha,value={{sha}}

      - uses: docker/setup-buildx-action@v4

      - uses: docker/build-push-action@v7
        with:
          context: docker
          push: true
          pull: true
          no-cache: ${{ github.event_name == 'schedule' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - uses: actions/delete-package-versions@v5
        with:
          package-name: ${{ github.event.repository.name }}/auv-builder
          package-type: container
          min-versions-to-keep: 3
          ignore-versions: '^(latest)$'
