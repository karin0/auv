name: Builder Image

on:
  schedule:
    - cron: '0 4 * * *'
  push:
    branches:
      - main
    paths:
      - 'docker/**'
      - '.github/workflows/image.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}/auv-builder
          tags: |
            type=raw,value=latest
            type=sha,value={{sha}}

      - uses: docker/setup-buildx-action@v4

      - name: Write GPG public key file
        run: echo "${{ vars.GPG_PUBLIC_KEY }}" > docker/key.asc

      - uses: docker/build-push-action@v7
        with:
          context: docker
          push: true
          pull: true
          no-cache: ${{ github.event_name == 'schedule' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            PACMAN_REPO_NAME=${{ vars.PACMAN_REPO_NAME }}
            PACMAN_REPO_URL=${{ vars.PACMAN_REPO_URL }}
            GPG_KEY_ID=${{ vars.GPG_KEY_ID }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - uses: actions/delete-package-versions@v5
        with:
          package-name: ${{ github.event.repository.name }}/auv-builder
          package-type: container
          min-versions-to-keep: 3
          ignore-versions: '^(latest)$'
